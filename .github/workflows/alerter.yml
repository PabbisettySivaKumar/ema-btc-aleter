name: price-alerter

on:
  # Triggered every 15 min by an external cron-job.org POST to GitHub's
  # workflow-dispatch API. GitHub's own `schedule` cron was unreliable — it
  # throttled/dropped ~80% of runs — so we drive the cadence externally.
  workflow_dispatch:   # manual trigger + external cron-job.org trigger

concurrency:
  group: alerter
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # allow committing the buy&hold anchor back (first run only)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run price alerter (one cycle)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python live/price_alert.py --once

      - name: Persist buy&hold anchor (first run only)
        run: |
          if [ -n "$(git status --porcelain -- live/hodl_state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add live/hodl_state.json
            git commit -m "state: buy&hold anchor [skip ci]"
            git push origin HEAD:main
          fi
